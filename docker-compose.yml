version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: community_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1106
      MYSQL_DATABASE: community
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: community_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456

  app:
    build: .
    container_name: community_app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1106
      DB_NAME: community
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: 1106
    volumes:
      - ./:/app

volumes:
  mysql_data: