services:
  mysql:
    image: mysql:8.0
    container_name: community_mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1106
      MYSQL_DATABASE: community
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: community_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 1106

  app:
    build: .
    container_name: community_app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    env_file:
      - .env   
    volumes:
      - ./:/app

volumes:
  mysql_data: